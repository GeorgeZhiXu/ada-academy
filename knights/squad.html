<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNIGHT SQUAD – VIRAL EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Comic Sans MS', cursive, sans-serif; background: #1a1a2e; }
        #ui { position:absolute;top:20px;left:20px;color:white;text-shadow:2px 2px 0 #ff00ff,4px 4px 0 #00ffff;font-size:22px;z-index:100;background:rgba(0,0,0,0.5);padding:10px 20px;border-radius:20px;border:2px solid gold; }
        #health-bar { width:200px;height:20px;background:#333;border:2px solid red;margin-top:5px; }
        #health-fill { height:100%;width:100%;background:linear-gradient(90deg,#ff0000,#ffaa00);transition:width .2s; }
        #ally-count { color:#00ffaa; }
        #viral-meter { position:absolute;top:120px;left:20px;width:200px;height:20px;background:#333;border:2px solid #ff00ff;border-radius:10px;overflow:hidden;z-index:100; }
        #viral-fill { height:100%;width:0%;background:linear-gradient(90deg,#ff00ff,#00ffff);transition:width .2s; }
        #commands { position:absolute;bottom:30px;left:30px;color:white;background:rgba(0,0,0,0.6);padding:10px;border-radius:15px;border:2px solid cyan;font-size:16px;z-index:100; }
        .command-key { background:yellow;color:black;padding:2px 8px;border-radius:5px;font-weight:bold; }
        #viral-button { position:absolute;bottom:30px;right:30px;width:100px;height:100px;border:4px solid #ff00ff;border-radius:50%;background:rgba(0,0,0,0.8);color:cyan;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:bold;cursor:pointer;transition:0.2s;box-shadow:0 0 30px magenta;z-index:100; }
        #viral-button.active { background:orange;color:white;transform:scale(1.1);border-color:gold; }
        #crosshair { position:absolute;top:50%;left:50%;width:40px;height:40px;border:3px solid rgba(255,255,255,0.8);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 20px cyan;z-index:200; }
        .meme-float { position:absolute;font-size:30px;font-weight:bold;color:yellow;text-shadow:2px 2px 0 red;pointer-events:none;z-index:1000;animation:floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-100px)} }
    </style>
</head>
<body>
    <div id="ui">
        ❤️ <span id="health">100</span> | ⭐ <span id="score">0</span> | 🛡️ Allies: <span id="ally-count">3</span> | 🌊 Wave <span id="wave">1</span>
        <div id="health-bar"><div id="health-fill"></div></div>
        <div id="viral-meter"><div id="viral-fill"></div></div>
        <div style="font-size:14px;margin-top:5px;">Viral Meter (V to activate)</div>
    </div>
    <div id="commands"><span class="command-key">1</span> Attack<br><span class="command-key">2</span> Follow<br><span class="command-key">3</span> Hold<br><span class="command-key">V</span> VIRAL MODE</div>
    <div id="viral-button">💥 VIRAL<br>READY</div>
    <div id="crosshair"></div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 30, 80);
        const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
        camera.position.set(0,20,25);
        const renderer = new THREE.WebGLRenderer({ antialias:true });
        renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
        renderer.shadowMap.enabled=true;renderer.toneMapping=THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(innerWidth,innerHeight);
        labelRenderer.domElement.style.cssText='position:absolute;top:0;left:0;pointer-events:none;';
        document.body.appendChild(labelRenderer.domElement);
        const controls = new PointerLockControls(camera, document.body);
        scene.add(controls.getObject());

        const healthSpan=document.getElementById('health'),healthFill=document.getElementById('health-fill');
        const scoreSpan=document.getElementById('score'),allyCountSpan=document.getElementById('ally-count');
        const waveSpan=document.getElementById('wave'),viralFill=document.getElementById('viral-fill');
        const viralButton=document.getElementById('viral-button');

        // Lighting
        scene.add(new THREE.AmbientLight(0x404060));
        const pl1=new THREE.PointLight(0xff00ff,1,30);pl1.position.set(10,15,10);scene.add(pl1);
        const pl2=new THREE.PointLight(0x00ffff,1,30);pl2.position.set(-10,15,-10);scene.add(pl2);
        const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,20,5);dl.castShadow=true;dl.shadow.mapSize.set(1024,1024);scene.add(dl);

        scene.add(new THREE.GridHelper(60,20,0xff00ff,0x00ffff));
        for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;const p=new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,4),new THREE.MeshStandardMaterial({color:0xaa44ff,emissive:0x330066}));p.position.set(Math.cos(a)*20,2,Math.sin(a)*20);p.castShadow=true;scene.add(p);}

        // Player
        const pg=new THREE.Group();
        const pbody=new THREE.Mesh(new THREE.CylinderGeometry(1,1,2),new THREE.MeshStandardMaterial({color:0x3399ff,emissive:0x113366}));pbody.position.y=1;pbody.castShadow=true;pg.add(pbody);
        const phead=new THREE.Mesh(new THREE.SphereGeometry(0.8),new THREE.MeshStandardMaterial({color:0xffccaa}));phead.position.y=2.2;phead.castShadow=true;pg.add(phead);
        const phelm=new THREE.Mesh(new THREE.ConeGeometry(0.9,0.8,8),new THREE.MeshStandardMaterial({color:0xffaa00,emissive:0x442200}));phelm.position.y=2.6;pg.add(phelm);
        const ed=document.createElement('div');ed.textContent='🤴';ed.style.cssText='font-size:30px;filter:drop-shadow(0 0 10px gold)';
        const el=new CSS2DObject(ed);el.position.set(0,3.5,0);pg.add(el);
        const blade=new THREE.Mesh(new THREE.BoxGeometry(0.2,1.8,0.2),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x666666}));blade.position.set(1,1.5,0.3);blade.rotation.z=-0.2;blade.castShadow=true;pg.add(blade);
        const psh=new THREE.Mesh(new THREE.BoxGeometry(1,1.5,0.2),new THREE.MeshStandardMaterial({color:0xff5555,emissive:0x330000}));psh.position.set(-1,1.2,0);psh.rotation.y=0.2;pg.add(psh);
        scene.add(pg);

        function memeText(pos,text){
            try{
            const p=pos.clone?pos.clone():new THREE.Vector3(pos.x||0,pos.y||0,pos.z||0);
            const d=document.createElement('div');d.textContent=text;
            d.style.cssText='color:yellow;font-size:30px;font-weight:bold;text-shadow:2px 2px 0 red;pointer-events:none;';
            const l=new CSS2DObject(d);l.position.copy(p);l.position.y+=2;scene.add(l);
            let age=0;const tick=()=>{age+=0.016;d.style.opacity=Math.max(0,1-age);l.position.y+=0.03;if(age<1)requestAnimationFrame(tick);else{try{scene.remove(l);}catch(e){}}};tick();
            }catch(e){}
        }

        class Ally{
            constructor(id,color,emoji){
                this.group=new THREE.Group();this.dead=false;
                const b=new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,1.8),new THREE.MeshStandardMaterial({color,emissive:0x222222}));b.position.y=0.9;b.castShadow=true;this.group.add(b);
                const h=new THREE.Mesh(new THREE.SphereGeometry(0.6),new THREE.MeshStandardMaterial({color:0xffccaa}));h.position.y=1.9;this.group.add(h);
                const ed2=document.createElement('div');ed2.textContent=emoji;ed2.style.cssText='font-size:24px;filter:drop-shadow(0 0 5px cyan)';
                const emojiLabel=new CSS2DObject(ed2);emojiLabel.position.set(0,2.8,0);this.group.add(emojiLabel);
                const hm=new THREE.Mesh(new THREE.ConeGeometry(0.7,0.6,6),new THREE.MeshStandardMaterial({color:0xcccccc,emissive:0x333333}));hm.position.y=2.2;this.group.add(hm);
                this.weapon=new THREE.Mesh(new THREE.BoxGeometry(0.2,1.2,0.2),new THREE.MeshStandardMaterial({color:0xcccccc}));this.weapon.position.set(0.7,1.2,0.3);this.weapon.rotation.z=-0.1;this.group.add(this.weapon);
                const c=document.createElement('div');c.style.cssText='width:40px;height:6px;background:#333;border:1px solid #666';
                this.hpF=document.createElement('div');this.hpF.style.cssText='width:100%;height:100%;background:#0f0';c.appendChild(this.hpF);
                const lb=new CSS2DObject(c);lb.position.set(0,2.5,0);this.group.add(lb);
                this.id=id;this.hp=80;this.maxHp=80;this.spd=4;this.atkPow=15;this.atkCd=0;this.atkR=3;this.state='follow';this.target=null;
            }
            update(dt,pp){
                if(this.dead)return;
                const pct=this.hp/this.maxHp;this.hpF.style.width=(pct*100)+'%';
                this.hpF.style.background=pct>.6?'#0f0':pct>.3?'#ff0':'#f00';
                if(this.atkCd>0)this.atkCd-=dt;
                if(this.state==='follow'){
                    const dist=pp.distanceTo(this.group.position);
                    if(dist>3){const dir=new THREE.Vector3().subVectors(pp,this.group.position).normalize();this.group.position.add(dir.multiplyScalar(this.spd*dt));}
                    this.group.lookAt(new THREE.Vector3(pp.x,this.group.position.y,pp.z));
                }else if(this.state==='attack'&&this.target&&!this.target.dead&&this.target.hp>0){
                    const tp=this.target.mesh.position;const dist=tp.distanceTo(this.group.position);
                    if(dist>this.atkR){const dir=new THREE.Vector3().subVectors(tp,this.group.position).normalize();this.group.position.add(dir.multiplyScalar(this.spd*1.5*dt));}
                    if(dist<this.atkR&&this.atkCd<=0){this.atkCd=1;this.target.takeDamage(this.atkPow);this.weapon.rotation.z=-1;setTimeout(()=>this.weapon.rotation.z=-0.1,150);memeText(tp,'💥 YEET!');}
                    this.group.lookAt(new THREE.Vector3(tp.x,this.group.position.y,tp.z));
                }else if(this.state==='attack'){this.state='follow';this.target=null;}
            }
            hit(amt){this.hp-=amt;if(this.hp<=0)memeText(this.group.position,'F in chat 💀');return this.hp<=0;}
            die(){this.dead=true;scene.remove(this.group);}
        }

        class Enemy{
            constructor(type,waveNum){
                let col=0xff44aa,hp=40+waveNum*5,spd=2.5+waveNum*0.15,sz=1,emoji='😈',dmg=12+waveNum*2;
                if(type==='fast'){col=0xffaa00;hp=25+waveNum*3;spd=4+waveNum*0.2;sz=0.7;emoji='👾';dmg=10;}
                else if(type==='tank'){col=0xff3333;hp=70+waveNum*8;spd=1.5;sz=1.2;emoji='🤡';dmg=20+waveNum;}
                const mat=new THREE.MeshStandardMaterial({color:col,emissive:0x220000});
                this.mesh=new THREE.Mesh(new THREE.ConeGeometry(sz,sz*2,6),mat);this.mesh.castShadow=true;
                const ed3=document.createElement('div');ed3.textContent=emoji;ed3.style.cssText='font-size:24px;filter:drop-shadow(0 0 5px red)';
                const emojiLbl=new CSS2DObject(ed3);emojiLbl.position.set(0,sz*2+0.5,0);this.mesh.add(emojiLbl);
                // Eyes
                [[-.25,.6,sz],[.25,.6,sz]].forEach(([x,y,z])=>{
                    const e=new THREE.Mesh(new THREE.SphereGeometry(0.15),new THREE.MeshBasicMaterial({color:0xffffff}));e.position.set(x,y,z);this.mesh.add(e);
                    const p=new THREE.Mesh(new THREE.SphereGeometry(0.07),new THREE.MeshBasicMaterial({color:0}));p.position.set(x,y,z+0.1);this.mesh.add(p);
                });
                const a=Math.random()*Math.PI*2;this.mesh.position.set(Math.cos(a)*25,sz,Math.sin(a)*25);scene.add(this.mesh);
                this.hp=hp;this.maxHp=hp;this.speed=spd;this.origSpeed=spd;this.type=type;this.damage=dmg;this.dead=false;
                const c=document.createElement('div');c.style.cssText='width:40px;height:5px;background:#333';
                this.hpF=document.createElement('div');this.hpF.style.cssText='width:100%;height:100%;background:#f00';c.appendChild(this.hpF);
                const hpLbl=new CSS2DObject(c);hpLbl.position.set(0,sz*2+0.5,0);this.mesh.add(hpLbl);
            }
            update(pp,dt){if(this.dead)return;const dir=new THREE.Vector3().subVectors(pp,this.mesh.position).normalize();this.mesh.position.add(dir.multiplyScalar(this.speed*dt));this.mesh.lookAt(pp);}
            takeDamage(amt){this.hp=Math.max(0,this.hp-amt);this.hpF.style.width=(this.hp/this.maxHp*100)+'%';this.mesh.material.emissive.setHex(0x442200);setTimeout(()=>{if(!this.dead)this.mesh.material.emissive.setHex(0x220000);},100);return this.hp<=0;}
            die(){this.dead=true;scene.remove(this.mesh);}
        }

        let health=100,maxHealth=100,score=0,wave=1,enemies=[],allies=[];
        let waveCount=8+wave*3,spawned=0,killed=0,viralMeter=0,viralActive=false,viralTimer=0;
        const MEMES=['YEET!','POG!','RIZZ','SKIBIDI','BASED','SIGMA','GYATT','NO CAP','BUSSIN','W'];
        const allyEmojis=['😎','🤘','🦍','🐐','👑'];

        for(let i=0;i<3;i++){const a=new Ally(i,[0x00ffaa,0xaa44ff,0xffaa44][i],allyEmojis[i]);a.group.position.set(i*2-2,0,2);scene.add(a.group);allies.push(a);}

        const ks={w:false,a:false,s:false,d:false};let atkDown=false;
        document.addEventListener('keydown',e=>{
            if(e.code==='KeyW')ks.w=true;if(e.code==='KeyS')ks.s=true;if(e.code==='KeyA')ks.a=true;if(e.code==='KeyD')ks.d=true;
            if(e.code==='KeyV'){e.preventDefault();if(viralMeter>=100)activateViral();}
            if(e.code==='Digit1')cmdAllies('attack');if(e.code==='Digit2')cmdAllies('follow');if(e.code==='Digit3')cmdAllies('hold');
            if(e.code==='Escape')controls.unlock();if(e.code==='KeyR')location.reload();
        });
        document.addEventListener('keyup',e=>{if(e.code==='KeyW')ks.w=false;if(e.code==='KeyS')ks.s=false;if(e.code==='KeyA')ks.a=false;if(e.code==='KeyD')ks.d=false;});
        document.addEventListener('mousedown',e=>{if(e.button===0)atkDown=true;});
        document.addEventListener('mouseup',e=>{if(e.button===0)atkDown=false;});
        renderer.domElement.addEventListener('click',()=>controls.lock());

        function cmdAllies(cmd){
            allies.forEach(a=>{if(a.dead)return;
                if(cmd==='attack'){let best=null,bd=Infinity;enemies.forEach(e=>{if(e.dead)return;const d=e.mesh.position.distanceTo(a.group.position);if(d<bd){bd=d;best=e;}});if(best){a.state='attack';a.target=best;}else{a.state='follow';a.target=null;}}
                else{a.state=cmd;a.target=null;}
            });
        }

        function activateViral(){
            viralActive=true;viralTimer=5;viralMeter=0;viralFill.style.width='0%';
            viralButton.style.background='cyan';viralButton.innerHTML='💥 VIRAL<br>ACTIVE';
            enemies.forEach(e=>{if(!e.dead){e.speed*=0.3;e.mesh.material.emissive.setHex(0xff00ff);}});
            allies.forEach(a=>{if(!a.dead)a.hp=Math.min(a.maxHp,a.hp+20);});
            health=Math.min(maxHealth,health+20);
            scene.background.setHex(0xffffff);setTimeout(()=>scene.background.setHex(0x1a1a2e),150);
            memeText(pg.position,'🚀 VIRAL MODE!');
        }

        function doAttack(){
            const pp=pg.position.clone(),fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            for(let i=enemies.length-1;i>=0;i--){
                const e=enemies[i];if(e.dead)continue;
                const toE=new THREE.Vector3().subVectors(e.mesh.position,pp);
                if(toE.length()<4.5&&fwd.dot(toE.normalize())>0.2){
                    const dmg=viralActive?50:25;
                    if(e.takeDamage(dmg)){
                        e.die();enemies.splice(i,1);killed++;score+=20;
                        viralMeter=Math.min(100,viralMeter+10);viralFill.style.width=viralMeter+'%';
                        if(viralMeter>=100){viralButton.style.background='gold';viralButton.innerHTML='💥 PRESS V<br>READY';}
                        memeText(e.mesh.position,MEMES[Math.floor(Math.random()*MEMES.length)]);
                    }
                    break;
                }
            }
            blade.rotation.z=-1.5;setTimeout(()=>blade.rotation.z=-0.2,100);
        }

        function spawnEnemy(){if(spawned>=waveCount)return;const r=Math.random();enemies.push(new Enemy(r<.2?'fast':r<.4?'tank':'normal',wave));spawned++;}
        function startWave(){spawned=0;killed=0;waveCount=8+wave*3;for(let i=0;i<5;i++)spawnEnemy();}
        startWave();

        let lt=performance.now()/1000,spT=0;
        function loop(){
            const now=performance.now()/1000,dt=Math.min(0.1,now-lt);lt=now;
            if(!controls.isLocked){renderer.render(scene,camera);labelRenderer.render(scene,camera);requestAnimationFrame(loop);return;}

            if(ks.w)controls.moveForward(8*dt);if(ks.s)controls.moveForward(-8*dt);
            if(ks.a)controls.moveRight(-8*dt);if(ks.d)controls.moveRight(8*dt);

            pg.position.copy(controls.getObject().position);pg.position.y=0;pg.rotation.y=camera.rotation.y;
            if(atkDown){doAttack();atkDown=false;}

            // Viral timer
            if(viralActive){viralTimer-=dt;if(viralTimer<=0){viralActive=false;enemies.forEach(e=>{if(!e.dead){e.speed=e.origSpeed;e.mesh.material.emissive.setHex(0x220000);}});viralButton.style.background='rgba(0,0,0,0.8)';viralButton.innerHTML='💥 VIRAL<br>READY';}}

            const pp=pg.position.clone();

            // Allies
            allies.forEach(a=>{if(a.dead)return;a.update(dt,pp);
                enemies.forEach(e=>{if(e.dead)return;if(e.mesh.position.distanceTo(a.group.position)<2&&Math.random()<dt*1.2){
                    if(a.hit(e.damage*0.3)){a.die();allies=allies.filter(x=>x!==a);memeText(a.group.position,'💀 RIP');}
                }});
            });

            // Enemies
            enemies.forEach(e=>{if(e.dead)return;e.update(pp,dt);
                if(pp.distanceTo(e.mesh.position)<2&&Math.random()<dt*1.5){
                    const dmg=viralActive?e.damage*0.1:e.damage*0.4;health-=dmg;
                    if(health<=0){health=0;controls.unlock();alert(`GAME OVER! Score: ${score}\n#KnightSquad`);location.reload();}
                }
            });

            spT+=dt;if(spT>1&&spawned<waveCount){spT=0;spawnEnemy();}

            // Clean dead enemies from array
            enemies=enemies.filter(e=>!e.dead);
            if(killed>=waveCount&&enemies.length===0){
                wave++;health=Math.min(maxHealth,health+30);
                if(wave%2===0){const a=new Ally(allies.length,0xffaa44,allyEmojis[allies.length%allyEmojis.length]);a.group.position.copy(pp.clone().add(new THREE.Vector3(2,0,2)));scene.add(a.group);allies.push(a);memeText(a.group.position,'🆕 NEW ALLY!');}
                startWave();
            }

            // Camera follow
            camera.position.set(pp.x,15,pp.z+20);camera.lookAt(pp);
            pl1.position.x=Math.sin(now)*10;pl1.position.z=Math.cos(now)*10;
            pl2.position.x=Math.sin(now+2)*10;pl2.position.z=Math.cos(now+2)*10;

            healthSpan.textContent=Math.floor(Math.max(0,health));healthFill.style.width=(health/maxHealth*100)+'%';
            scoreSpan.textContent=score;waveSpan.textContent=wave;allyCountSpan.textContent=allies.filter(a=>!a.dead).length;

            renderer.render(scene,camera);labelRenderer.render(scene,camera);requestAnimationFrame(loop);
        }
        loop();
        addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);});
    </script>
</body>
</html>
