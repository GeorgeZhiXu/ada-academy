<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WARFRONT</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;cursor:crosshair}
        canvas{display:block}
        #title{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:100}
        #title h1{font-size:72px;font-weight:900;color:#ef4444;letter-spacing:6px;text-shadow:0 0 60px rgba(239,68,68,.5)}
        #title p{color:rgba(255,255,255,.4);margin:4px 0 24px;font-size:14px}
        #title button{padding:16px 48px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;margin:4px}
        #title button:hover{background:#dc2626}
        #title.hidden{display:none}
        #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:10px 16px;z-index:10;pointer-events:none}
        .hb{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:6px 14px;font-size:13px;color:#fff;backdrop-filter:blur(4px);display:flex;align-items:center;gap:6px}
        #hp-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:200px;z-index:10;pointer-events:none}
        #hp-bar-bg{width:100%;height:8px;background:rgba(0,0,0,.5);border-radius:4px;overflow:hidden}
        #hp-bar-fill{height:100%;background:#ef4444;border-radius:4px;transition:width .3s}
        #hp-label{text-align:center;font-size:11px;color:#aaa;margin-top:3px}
        #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;z-index:5;pointer-events:none}
        #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.5)}
        #crosshair::before{width:2px;height:24px;left:11px}
        #crosshair::after{width:24px;height:2px;top:11px}
        #killfeed{position:fixed;top:50px;right:12px;z-index:10;pointer-events:none;display:flex;flex-direction:column;gap:3px;max-width:220px}
        .kf{background:rgba(0,0,0,.6);padding:4px 10px;border-radius:4px;font-size:10px;border-left:2px solid #ef4444;color:#fca5a5;animation:kfIn .3s}
        @keyframes kfIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        #objective{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:6px 20px;font-size:13px;font-weight:600;color:#fca5a5;z-index:10;pointer-events:none}
        #controls-hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:10px;z-index:10;pointer-events:none}
        #flash{position:fixed;inset:0;pointer-events:none;z-index:8;opacity:0;transition:opacity .1s}
        #dmg-vignette{position:fixed;inset:0;pointer-events:none;z-index:7;background:radial-gradient(ellipse,transparent 50%,rgba(239,68,68,.3) 100%);opacity:0;transition:opacity .3s}
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size:52px;margin-bottom:8px">⚔️</div>
        <h1>WARFRONT</h1>
        <p>Lead your knights. Capture the flag. Win the battle.</p>
        <button onclick="startGame()">FIGHT</button>
        <p style="color:rgba(255,255,255,.2);font-size:11px;margin-top:12px">WASD move · Mouse aim · Left click attack · Right click block · Space sprint</p>
    </div>
    <div id="hud">
        <div class="hb">⚔️ <span id="h-kills">0</span> kills</div>
        <div class="hb">🏳️ <span id="h-flags">0</span>/3 flags</div>
        <div class="hb" style="color:#3b82f6">🔵 <span id="h-allies">0</span></div>
        <div class="hb" style="color:#ef4444">🔴 <span id="h-enemies">0</span></div>
    </div>
    <div id="objective">⚔️ CAPTURE 3 FLAGS TO WIN</div>
    <div id="crosshair"></div>
    <div id="hp-bar"><div id="hp-bar-bg"><div id="hp-bar-fill" style="width:100%"></div></div><div id="hp-label">100 HP</div></div>
    <div id="killfeed"></div>
    <div id="controls-hint">WASD move · Mouse look · Left click attack · Right click block · Space sprint</div>
    <div id="flash"></div>
    <div id="dmg-vignette"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
